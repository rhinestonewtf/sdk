name: Compatibility Tests

on:
  pull_request:
    branches:
      - main
      - release

jobs:
  test:
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ["node-cjs", "node-esm", "react-native"]

    steps:
      # Setup and Build
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build SDK
        run: bun run build

      # Package SDK for Testing
      - name: Pack SDK
        working-directory: src
        run: bunx npm pack --pack-destination $GITHUB_WORKSPACE/

      # Run package compatibility smoke tests
      - name: Test ${{ matrix.environment }} package compatibility
        run: ./.github/scripts/test-${{ matrix.environment }}.sh

  release-package-contract:
    if: github.base_ref == 'release'
    runs-on: ubuntu-latest
    env:
      SDK_CONTRACT_BASE_SHA: 49efb8b8d957b2eea2b24c11ac56d6c4d80478d6
      SDK_CONTRACT_RESULTS_DIR: ${{ runner.temp }}/sdk-contract-results

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run packed package contract tests
        run: bun run test:contract

      - name: Upload contract result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-package-contract
          path: ${{ env.SDK_CONTRACT_RESULTS_DIR }}/contract-result.json
          if-no-files-found: error
