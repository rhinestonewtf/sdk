name: Characterization Tests

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional non-secret run ID; generated when omitted
        required: false
        type: string

run-name: Characterization (dev) by @${{ github.actor }}

permissions:
  contents: read

concurrency:
  group: characterization-${{ github.ref }}
  cancel-in-progress: false

env:
  SDK_ITEST_BASE_SHA: 49efb8b8d957b2eea2b24c11ac56d6c4d80478d6
  SDK_ITEST_RUN_ID: ${{ inputs.run_id != '' && inputs.run_id || format('gh-{0}-{1}', github.run_id, github.run_attempt) }}

jobs:
  characterize:
    name: legacy -> public shard ${{ matrix.shard }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # One shared funder is used across shards. Raise this only after funded
      # lanes have independent nonce ownership and calibration evidence.
      max-parallel: 1
      matrix:
        shard:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          - 8
    env:
      SDK_ITEST_COMPARE: legacy,public
      SDK_ITEST_SHARD: ${{ matrix.shard }}/8
      SDK_ITEST_RESULTS_DIR: ${{ runner.temp }}/sdk-characterization-results
      INTEGRATION_TARGET: dev
      INTEGRATION_ORCHESTRATOR_URL: https://dev.v1.orchestrator.rhinestone.dev
      INTEGRATION_USE_DEV_CONTRACTS: 'true'
      INTEGRATION_FUNDER_PRIVATE_KEY: ${{ secrets.INTEGRATION_FUNDER_PRIVATE_KEY }}

    steps:
      - name: Resolve integration API key
        env:
          DEV_API_KEY: ${{ secrets.INTEGRATION_RHINESTONE_API_KEY_DEV }}
          DEV_RELAYER_API_KEY: ${{ secrets.INTEGRATION_RELAYER_API_KEY_DEV }}
        run: |
          set -euo pipefail
          if [ -z "$DEV_API_KEY" ]; then
            echo "::error::characterization requires INTEGRATION_RHINESTONE_API_KEY_DEV"
            exit 1
          fi
          if [ -z "$DEV_RELAYER_API_KEY" ]; then
            echo "::error::characterization requires INTEGRATION_RELAYER_API_KEY_DEV"
            exit 1
          fi
          echo "INTEGRATION_RHINESTONE_API_KEY=$DEV_API_KEY" >> "$GITHUB_ENV"
          echo "INTEGRATION_RHINESTONE_API_RELAYER_KEY=$DEV_RELAYER_API_KEY" >> "$GITHUB_ENV"

      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify calibrated base commit
        run: git cat-file -e "${SDK_ITEST_BASE_SHA}^{commit}"

      - name: Run characterization shard
        run: bun run test:characterization:compare -- --run

      - name: Stage secret-scanned characterization evidence
        if: always()
        env:
          UPLOAD_ROOT: ${{ runner.temp }}/characterization-upload
        run: |
          set -euo pipefail
          for SUBJECT in legacy public; do
            SOURCE_DIRECTORY="$SDK_ITEST_RESULTS_DIR/$SDK_ITEST_RUN_ID/$SUBJECT"
            CHECKPOINTS="$SOURCE_DIRECTORY/scenarios"
            SHARD="$SOURCE_DIRECTORY/shard-${{ matrix.shard }}-of-8.json"
            DESTINATION="$UPLOAD_ROOT/$SDK_ITEST_RUN_ID/$SUBJECT"
            test -d "$CHECKPOINTS"
            test -n "$(find "$CHECKPOINTS" -type f -name '*.json' -print -quit)"
            mkdir -p "$DESTINATION"
            cp -R "$CHECKPOINTS" "$DESTINATION/"
            if [ -f "$SHARD" ]; then
              cp "$SHARD" "$DESTINATION/"
            fi
          done

      - name: Upload characterization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: characterization-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shard }}
          path: ${{ runner.temp }}/characterization-upload
          if-no-files-found: error
          retention-days: 14

  aggregate:
    name: Aggregate characterization evidence
    if: always()
    needs: characterize
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SDK_ITEST_COMPARE: legacy,public
      SDK_ITEST_RESULTS_DIR: ${{ runner.temp }}/sdk-characterization-results

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download shard results
        uses: actions/download-artifact@v4
        with:
          pattern: characterization-${{ github.run_id }}-${{ github.run_attempt }}-*
          path: ${{ env.SDK_ITEST_RESULTS_DIR }}
          merge-multiple: true

      - name: Aggregate characterization results
        run: bun run test:characterization:aggregate

      - name: Upload aggregate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: characterization-${{ github.run_id }}-${{ github.run_attempt }}-aggregate
          path: ${{ env.SDK_ITEST_RESULTS_DIR }}
          if-no-files-found: error
          retention-days: 14
