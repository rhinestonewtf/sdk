name: Release

on:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  wasm:
    uses: ./.github/workflows/wasm.yml

  build-and-test:
    name: Build & Test
    needs: [wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install the npm dependencies
        run: bun install

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: eip712-mapper-wasm
          path: crates/eip712-mapper/target/wasm32-unknown-unknown/release/

      - name: Set default WASM binary
        run: cp crates/eip712-mapper/target/wasm32-unknown-unknown/release/eip712_mapper_viem_prod.wasm crates/eip712-mapper/target/wasm32-unknown-unknown/release/eip712_mapper_viem.wasm

      - name: Clean
        run: bun run clean

      - name: Test all
        run: bun run test
        env:
          VITE_ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY}}

      - name: Build all
        run: bun run build

      - name: Publint
        working-directory: src
        run: bunx publint

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          commit: "chore: release"
          title: "Release"
          publish: bun run changeset:release
          version: bun run changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
