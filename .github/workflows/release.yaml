name: Release

on:
  push:
    branches:
      - main
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install the npm dependencies
        run: bun install

      - name: Clean
        run: bun run clean

      - name: Test all
        run: bun run test
        env:
          VITE_ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY}}

      - name: Build all
        run: bun run build

      - name: Publint
        working-directory: src
        run: bunx publint

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Use OIDC-capable npm
        run: npm install -g npm@latest

      - name: Install the npm dependencies
        run: bun install --frozen-lockfile

      # Snapshot publish (main → @dev)
      - name: Version snapshot
        if: github.ref == 'refs/heads/main'
        run: bunx changeset version --snapshot dev && bun run scripts/sync-version.ts

      - name: Build and publish snapshot
        if: github.ref == 'refs/heads/main'
        run: bun run build && bunx changeset publish --tag dev

      # Beta/prod publish (release → Release PR or @latest)
      - name: Create Release Pull Request or Publish
        if: github.ref == 'refs/heads/release'
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: release"
          title: "Release"
          publish: bun run changeset:release
          version: bun run changeset:version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Label release PR
        if: github.ref == 'refs/heads/release' && steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh pr edit ${{ steps.changesets.outputs.pullRequestNumber }} --add-label ship
