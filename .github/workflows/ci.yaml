name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

  wasm:
    uses: ./.github/workflows/wasm.yml

  test:
    needs: [build, wasm]
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install the npm dependencies
        run: bun install

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: eip712-mapper-wasm
          path: crates/eip712-mapper/target/wasm32-unknown-unknown/release/

      - name: Set default WASM binary
        run: cp crates/eip712-mapper/target/wasm32-unknown-unknown/release/eip712_mapper_viem_prod.wasm crates/eip712-mapper/target/wasm32-unknown-unknown/release/eip712_mapper_viem.wasm

      - name: Clean
        run: bun run clean

      - name: Run tests
        run: bun run test
        env:
          VITE_ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY}}
