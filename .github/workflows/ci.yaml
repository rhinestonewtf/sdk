name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install

      - name: Verify wire types match the published OpenAPI spec
        run: |
          bun run generate:wire
          git diff --exit-code src/orchestrator/wire.gen.ts

      - name: Build
        run: bun run build

      - name: Check
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Type tests
        run: bun run test:types

  test:
    needs: ["build"]
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install

      - name: Clean
        run: bun run clean

      - name: Run tests
        run: bun run test
