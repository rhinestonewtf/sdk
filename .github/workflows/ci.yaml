name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install

      - name: Verify wire types match the published OpenAPI spec
        run: |
          bun run generate:wire
          git diff --exit-code src/orchestrator/wire.gen.ts

      # Fail if a public export drifts from the curated reference manifest.
      # Renders to a throwaway dir; the docs.json patch no-ops on a missing path.
      - name: Verify SDK reference coverage
        env:
          SDK_REF_OUT: ${{ runner.temp }}/sdk-reference
          SDK_REF_DOCS_JSON: ${{ runner.temp }}/docs.json
          SDK_REF_CHECK: "1"
        run: bun run generate:reference

      - name: Build
        run: bun run build

      - name: Check
        run: bun run check

      - name: Check architecture
        run: bun run check:architecture

      - name: Typecheck
        run: bun run typecheck

      - name: Type tests
        run: bun run test:types

  test:
    needs: ["build"]
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out the repo
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install the npm dependencies
        run: bun install

      - name: Clean
        run: bun run clean

      - name: Run tests
        run: bun run test

      - name: Check pure-core coverage
        run: bun run test:coverage:core
