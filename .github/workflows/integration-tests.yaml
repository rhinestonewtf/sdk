name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Integration suite to run"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - all

concurrency:
  group: release-integration-tests
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INTEGRATION_RHINESTONE_API_KEY: ${{ secrets.INTEGRATION_RHINESTONE_API_KEY }}

    steps:
      - name: Check out release
        uses: actions/checkout@v4
        with:
          ref: release

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run smoke integration tests
        if: ${{ inputs.suite == 'smoke' }}
        run: bun run test:integration:smoke -- --run

      - name: Run all integration tests
        if: ${{ inputs.suite == 'all' }}
        run: bun run test:integration -- --run
